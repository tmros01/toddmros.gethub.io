<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title></title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  color:white;
  background:#05070d;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

header{
  width:100%;
  display:flex;
  justify-content:center;
  margin-top:11vh;
  padding:0 10px;
}

h1{
  width:90%;
  max-width:900px;
  text-align:center;
  font-family:'Orbitron', sans-serif;
  font-weight:700;
  font-size:clamp(1.8rem,4vw,3rem);
  line-height:1.3;
  letter-spacing:1px;
}

/* cyber glow + shadow per character */
h1 span{
  text-shadow:
    2px 2px 4px rgba(0,0,0,0.8),
    0 0 6px rgba(0,255,255,0.7),
    0 0 14px rgba(0,255,255,0.6),
    0 0 28px rgba(0,255,255,0.4);
}

/* New Enter Link Styles */
.enter-link {
  position: absolute;
  bottom: 10vh; /* Positions it 10% from the bottom */
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 1.5rem;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 10;
  text-shadow:
    0 0 6px rgba(0,255,255,0.7),
    0 0 14px rgba(0,255,255,0.6);
  transition: all 0.3s ease;
}

.enter-link:hover {
  color: #00ffff;
  text-shadow:
    0 0 10px rgba(0,255,255,0.9),
    0 0 20px rgba(0,255,255,0.8),
    0 0 35px rgba(0,255,255,0.5);
  transform: scale(1.05);
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
<h1 id="title"></h1>
</header>

/* <a href="file:./page2.html" class="enter-link">Enter</a>
<a href="page2.html">About Page</a>

<script>
/* title letters */
const text = "Todd Mros is Proudly Not a Member of Any Social Media Platform";
const title = document.getElementById("title");
text.split("").forEach(char=>{
  const span=document.createElement("span");
  span.textContent=char;
  title.appendChild(span);
});

/* animated tech particles + circuit lines */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let particles = [];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", resize);
resize();

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*0.6,
    vy:(Math.random()-.5)*0.6,
    size:Math.random()*2+1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ffff";

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  /* circuit connection lines */
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      let dx = particles[i].x - particles[j].x;
      let dy = particles[i].y - particles[j].y;
      let dist = Math.sqrt(dx*dx+dy*dy);

      if(dist < 120){
        ctx.strokeStyle = "rgba(0,255,255,"+(1-dist/120)+")";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
